<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K2 Company</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#000;color:#fff;overflow:hidden;}

/* CANVAS SMOKE */
canvas{
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 z-index:-1;
}

/* CONTENT */
.hero{
 height:100vh;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 text-align:center;
 animation:fade 2s ease;
}

h1{
 font-size:48px;
 letter-spacing:6px;
}

.subtitle{
 color:red;
 margin-top:10px;
 font-size:20px;
}

.btn{
 margin-top:30px;
 padding:15px 40px;
 border:1px solid red;
 color:white;
 text-decoration:none;
 transition:0.3s;
}

.btn:hover{
 background:red;
 box-shadow:0 0 20px red;
}

/* SECTION */
.section{
 padding:80px 20px;
 text-align:center;
}

.cards{
 display:flex;
 justify-content:center;
 flex-wrap:wrap;
 gap:20px;
 margin-top:30px;
}

.card{
 width:250px;
 padding:25px;
 background:#111;
 border:1px solid #222;
 transition:0.3s;
}

.card:hover{
 transform:translateY(-10px);
 border-color:red;
 box-shadow:0 0 20px red;
}

footer{
 text-align:center;
 padding:40px;
 border-top:1px solid #222;
}

@keyframes fade{
 from{opacity:0}
 to{opacity:1}
}
</style>
</head>

<body>

<canvas id="smoke"></canvas>

<div class="hero">
 <h1>K2 COMPANY</h1>
 <div class="subtitle">Affiliate Network</div>
 <a href="https://t.me/K2_Lino" class="btn">Start Working</a>
</div>

<div class="section">
 <h2>Who We Are</h2>
 <p>K2 Company — affiliate network focused on Crypto & Forex live traffic.</p>
</div>

<div class="section">
 <h2>What We Offer</h2>
 <div class="cards">
  <div class="card">Crypto Traffic</div>
  <div class="card">Forex Traffic</div>
  <div class="card">Tier 1 / 2 / 3 GEO</div>
 </div>
</div>

<footer>
 Contact: <a href="https://t.me/K2_Lino">@K2_Lino</a>
</footer>

<script>
const canvas = document.getElementById('smoke');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<100;i++){
 particles.push({
  x:Math.random()*canvas.width,
  y:Math.random()*canvas.height,
  r:Math.random()*3+1,
  dx:(Math.random()-0.5)*0.5,
  dy:(Math.random()-0.5)*0.5
 });
}

function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 particles.forEach(p=>{
  ctx.beginPath();
  ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
  ctx.fillStyle="rgba(255,0,0,0.2)";
  ctx.fill();

  p.x+=p.dx;
  p.y+=p.dy;

  if(p.x<0||p.x>canvas.width)p.dx*=-1;
  if(p.y<0||p.y>canvas.height)p.dy*=-1;
 });

 requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
